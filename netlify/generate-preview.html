<!DOCTYPE html>
<html>
<head><title>Generate Preview Image</title></head>
<body>
<p style="font-family:sans-serif;">Generating preview image... it will download automatically.</p>
<canvas id="c" width="1200" height="630" style="display:none;"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1200, H = 630;

// Background
ctx.fillStyle = '#14171c';
ctx.fillRect(0, 0, W, H);

// Gold accent bar on left
ctx.fillStyle = '#e0a52e';
ctx.fillRect(0, 0, 8, H);

// Subtle grid pattern
ctx.strokeStyle = 'rgba(255,255,255,0.03)';
ctx.lineWidth = 1;
for(let x = 0; x < W; x += 60){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
for(let y = 0; y < H; y += 60){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

// Icon background circle
ctx.fillStyle = 'rgba(224,165,46,0.12)';
ctx.beginPath();
ctx.arc(180, 240, 90, 0, Math.PI * 2);
ctx.fill();

// Draw VIN icon using Path2D (scaled up)
ctx.save();
ctx.translate(180, 240);
ctx.scale(5.5, 5.5);
ctx.strokeStyle = '#e0a52e';
ctx.lineWidth = 1.6;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
// rect x="3" y="6" width="18" height="12" rx="2"
ctx.beginPath();
ctx.roundRect(-9, -6, 18, 12, 2);
ctx.stroke();
// M7 10v4 => translate: 7-12=-5, 10-12=-2 to 7-12=-5, 14-12=2
ctx.beginPath(); ctx.moveTo(-5,-2); ctx.lineTo(-5,2); ctx.stroke();
// M11 10v4 => 11-12=-1
ctx.beginPath(); ctx.moveTo(-1,-2); ctx.lineTo(-1,2); ctx.stroke();
// M15 10l2 4 => 15-12=3, 10-12=-2, to 17-12=5, 14-12=2
ctx.beginPath(); ctx.moveTo(3,-2); ctx.lineTo(5,2); ctx.stroke();
// M15 10h2
ctx.beginPath(); ctx.moveTo(3,-2); ctx.lineTo(5,-2); ctx.stroke();
ctx.restore();

// Company name
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 72px Arial, sans-serif';
ctx.fillText('Speedy', 320, 210);

ctx.fillStyle = '#e0a52e';
ctx.font = 'bold 72px Arial, sans-serif';
ctx.fillText('VIN', 320, 295);

ctx.fillStyle = '#ffffff';
ctx.font = 'bold 72px Arial, sans-serif';
ctx.fillText('Verifications', 320, 380);

// Tagline
ctx.fillStyle = '#9aa0a8';
ctx.font = '32px Arial, sans-serif';
ctx.fillText('"Get it right the first time."', 320, 440);

// Bottom info bar
ctx.fillStyle = 'rgba(224,165,46,0.15)';
ctx.fillRect(0, H - 80, W, 80);

ctx.fillStyle = '#e0a52e';
ctx.font = 'bold 22px Arial, sans-serif';
ctx.fillText('Licensed & Bonded  •  Lake Elsinore, CA  •  (951) 245-5080  •  speedyvinverifications.netlify.app', 40, H - 28);

// Download
const a = document.createElement('a');
a.download = 'preview.png';
a.href = c.toDataURL('image/png');
a.click();
document.querySelector('p').textContent = 'Done! Move preview.png into your vin-verify folder.';
</script>
</body>
</html>
